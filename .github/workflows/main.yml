name: Update Valid Links  
  
concurrency:  
    group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}  
    cancel-in-progress: true  
  
on:  
    schedule:  
        - cron: '0 0 28 * *'   # dia 28 de cada mês à meia-noite UTC  
    workflow_dispatch:           # permite disparar manualmente (pra rodar agora)  
  
permissions:  
    contents: write  
  
jobs:  
    update-links:  
        name: Run RO Setup Finder  
        runs-on: ubuntu-latest  
  
        steps:  
            - name: Checkout repository  
              uses: actions/checkout@v4  
  
            - name: Setup Python  
              uses: actions/setup-python@v5  
              with:  
                  python-version: '3.12'  
  
            - name: Install dependencies  
              run: pip install aiohttp  
  
            - name: Run RO Setup Finder  
              run: python3 rosetupfinder.py  
  
            - name: Commit updated links  
              run: |  
                  git config user.name "github-actions"  
                  git config user.email "github-actions@users.noreply.github.com"  
                  git add links_validos.txt  
  
                  git diff --cached --quiet || git commit -m "links: auto update links_validos.txt"  
                  git push
